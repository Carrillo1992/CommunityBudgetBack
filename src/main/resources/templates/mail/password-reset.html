<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperacion de contrasena</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:Arial,sans-serif;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f6f8;padding:24px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background-color:#ffffff;border-radius:8px;padding:24px;">
                <tr>
                    <td>
                        <h1 style="margin:0 0 16px;font-size:22px;color:#1f2937;">Recuperacion de contrasena</h1>
                        <p style="margin:0 0 12px;color:#374151;font-size:14px;line-height:1.6;">
                            Hola, <strong th:text="${userEmail}">usuario@correo.com</strong>.
                        </p>
                        <p style="margin:0 0 16px;color:#374151;font-size:14px;line-height:1.6;">
                            Recibimos una solicitud para restablecer tu contrasena en CommunityBudget.
                        </p>
                        <p style="margin:0 0 24px;color:#374151;font-size:14px;line-height:1.6;">
                            Este enlace caduca en <strong th:text="${expirationMinutes}">15</strong> minutos.
                        </p>

                        <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 24px;">
                            <tr>
                                <td style="border-radius:6px;background-color:#2563eb;">
                                    <a th:href="${resetLink}"
                                       href="https://communitybudget.local/reset-password"
                                       style="display:inline-block;padding:12px 20px;color:#ffffff;text-decoration:none;font-size:14px;font-weight:bold;">
                                        Restablecer contrasena
                                    </a>
                                </td>
                            </tr>
                        </table>

                        <p style="margin:0 0 8px;color:#6b7280;font-size:12px;line-height:1.6;">
                            Si no solicitaste este cambio, puedes ignorar este correo.
                        </p>
                        <p style="margin:0;color:#6b7280;font-size:12px;line-height:1.6;">
                            Enlace alternativo:
                            <a th:href="${resetLink}" th:text="${resetLink}" href="#" style="color:#2563eb;word-break:break-all;">link</a>
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
