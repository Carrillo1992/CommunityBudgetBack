openapi: 3.1.0
info:
  title: CommunityBudget API
  version: 1.0.0
servers:
  - url: http://localhost:8080

tags:
  - name: Expenses
    description: Operaciones relacionadas con gastos

security:
  - BearerAuth: [ ]

paths:
  /groups/{groupId}/expenses:
    get:
      tags:
        - Expenses
      summary: Obtiene la lista de gastos de un grupo
      operationId: getExpensesByGroup
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Lista de gastos obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExpenseDto'
        '401':
          description: No autorizado
        '403':
          description: Acceso denegado
        '404':
          description: Grupo no encontrado
    post:
      tags:
        - Expenses
      summary: Crea un nuevo gasto en un grupo
      operationId: createExpense
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseRequest'
      responses:
        '201':
          description: Gasto creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseDto'
        '400':
          description: Datos de entrada inválidos
        '404':
          description: Grupo o pagador no encontrado

  /groups/{groupId}/expenses/{expenseId}:
    get:
      tags:
        - Expenses
      summary: Obtiene los detalles de un gasto específico
      operationId: getExpenseById
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: expenseId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Gasto obtenido exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseDto'
        '404':
          description: Gasto no encontrado
    put:
      tags:
        - Expenses
      summary: Actualiza un gasto existente
      operationId: updateExpense
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: expenseId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExpenseRequest'
      responses:
        '200':
          description: Gasto actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseDto'
        '400':
          description: Datos de entrada inválidos
        '404':
          description: Gasto no encontrado
    delete:
      tags:
        - Expenses
      summary: Elimina un gasto
      operationId: deleteExpense
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: expenseId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Gasto eliminado exitosamente
        '404':
          description: Gasto no encontrado

  /groups/{groupId}/balances:
    get:
      tags:
        - Expenses
      summary: Obtiene el resumen de saldos por cada miembro del grupo
      operationId: getBalances
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Resumen de saldos obtenido exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserBalanceDto'
        '404':
          description: Grupo no encontrado

  /groups/{groupId}/settlements:
    get:
      tags:
        - Expenses
      summary: Obtiene la lista optimizada de deudas (quién debe pagar a quién)
      operationId: getOptimizedDebts
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Algoritmo de deudas calculado exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DebtDto'
        '404':
          description: Grupo no encontrado
    post:
      tags:
        - Expenses
      summary: Registra un pago para liquidar una deuda entre dos usuarios
      operationId: createSettlement
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettleUpRequest'
      responses:
        '200':
          description: Pago registrado exitosamente
        '400':
          description: Datos inválidos
        '404':
          description: Grupo o usuarios no encontrados

components:
  schemas:
    ExpenseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string
        amount:
          type: number
          format: double
        date:
          type: string
          format: date-time
        paidBy:
          $ref: '#/components/schemas/UserDto'
        splits:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseSplitDto'

    ExpenseSplitDto:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserDto'
        amount:
          type: number
          format: double

    CreateExpenseRequest:
      type: object
      required:
        - description
        - amount
        - paidBy
      properties:
        description:
          type: string
          example: "Cena de equipo"
        amount:
          type: number
          format: double
          example: 50.0
        date:
          type: string
          format: date-time
          example: "2024-03-24T15:30:00"
        paidBy:
          type: integer
          format: int64
          description: ID del miembro que realizó el pago
        splits:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseSplitDto'

    UpdateExpenseRequest:
      type: object
      properties:
        description:
          type: string
          description: Descripción del gasto
        amount:
          type: number
          format: double
          description: Monto total del gasto
        date:
          type: string
          format: date-time
          description: Fecha del gasto en formato ISO 8601
        paidBy:
          type: integer
          format: int64
          description: ID del miembro que realizó el pago
        splits:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseSplitDto'

    UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true

    UserBalanceDto:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserDto'
        totalPaid:
          type: number
          format: double
          description: Total de dinero que el usuario ha puesto
        totalOwed:
          type: number
          format: double
          description: Total de dinero que el usuario debe por su participación
        netBalance:
          type: number
          format: double
          description: Saldo neto (totalPaid - totalOwed). Si es positivo le deben dinero, si es negativo debe pagar.

    DebtDto:
      type: object
      properties:
        fromUser:
          $ref: '#/components/schemas/UserDto'
          description: El usuario que tiene que hacer el pago
        toUser:
          $ref: '#/components/schemas/UserDto'
          description: El usuario que recibe el pago
        amount:
          type: number
          format: double
          description: La cantidad exacta a transferir

    SettleUpRequest:
      type: object
      required:
        - payerId
        - receiverId
        - amount
      properties:
        payerId:
          type: integer
          format: int64
          description: ID del que envía el dinero (El que paga la deuda)
        receiverId:
          type: integer
          format: int64
          description: ID del que recibe el dinero (Al que le debían)
        amount:
          type: number
          format: double
          description: Monto exacto que se transfiere